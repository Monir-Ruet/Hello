<html>

<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
</head>

<body>
    <video id="video" controls autoplay width="900"></video>

    <script>
        (async () => {
            const video = document.getElementById('video');

            const player = new shaka.Player(video);

            player.configure({
                drm: {
                    clearKeys: {
                        "1f68713028d439ec03be07f56c1d6213":
                            "20093db6455160fffed4c394def3193d"
                    }
                }
            });

            try {
                await player.load(
                    'https://otte-qw.live.pv-cdn.net/lhr-nitro/live/clients/dash/enc/ifz2pnwgbv/out/v1/31d30c91fc65458789b84209d3fa22e4/cenc.mpd'
                );

                console.log("loaded");
            } catch (e) {
                console.error(e);
            }
        })();
    </script>
</body>

</html>
